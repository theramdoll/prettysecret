<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pretty Secret</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Reddit+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#0d0d0d;color:white;font-family:'Reddit Sans',sans-serif;}
header{text-align:center;padding:20px;font-size:40px;font-family:'Orbitron',sans-serif;}
.container{display:flex;height:90vh;}
.left{width:60%;padding:20px;overflow-y:scroll;border-right:1px solid #333;}
.secret{background:#1a1a1a;padding:15px;margin-bottom:15px;border-radius:10px;}
.meta{font-size:12px;color:#aaa;}
.right{width:40%;padding:20px;}
textarea,input{width:100%;background:#111;border:none;color:white;padding:10px;border-radius:5px;margin-top:10px;}
.gender{display:flex;margin-top:10px;}
.gender button{flex:1;padding:10px;background:black;color:white;border:1px solid #333;}
button{cursor:pointer}

.reaction-btn{font-size:20px;margin:5px;cursor:pointer}
.reacted{animation:pop .4s ease;filter:drop-shadow(0 0 6px #fff)}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}

.footer{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:10px;
font-size:10px;color:#bbb}
.close-btn{position:absolute;top:4px;right:6px;cursor:pointer}
</style>
</head>

<body>

<header>PRETTY SECRET</header>

<div class="container">

<div class="left" id="secrets"></div>

<div class="right">
<h3>Confesá tu secreto</h3>
<textarea id="text"></textarea>
<input type="number" id="age" placeholder="Edad">

<div class="gender">
<button onclick="setGender('M')">M</button>
<button onclick="setGender('F')">F</button>
<button onclick="setGender('X')">X</button>
</div>

<button id="sendBtn">Enviar</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, updateDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIza...",
 authDomain:"prettysecret-32c22.firebaseapp.com",
 projectId:"prettysecret-32c22"
});

const db = getFirestore(app);

let selectedGender="X";
window.setGender=(g)=>selectedGender=g;

/* SEGURIDAD */
const banned=["idiota","puta","odio"];
function bad(t){return banned.some(w=>t.toLowerCase().includes(w))}
function personal(t){
 return /\d{7,}|@\w+|\S+@\S+/.test(t)
}

/* TIEMPO */
function timeAgo(t){
 const d=Math.floor((Date.now()-t)/1000);
 if(d<60)return"ahora";
 if(d<3600)return Math.floor(d/60)+"m";
 if(d<86400)return Math.floor(d/3600)+"h";
 return Math.floor(d/86400)+"d";
}

/* POST */
async function addSecret(){
 const t=document.getElementById("text");
 const a=document.getElementById("age");

 if(!t.value||!a.value)return alert("Completá");

 if(bad(t.value))return alert("Contenido bloqueado");
 if(personal(t.value))return alert("No datos personales");

 await addDoc(collection(db,"secretos"),{
  text:t.value,
  age:a.value,
  gender:selectedGender,
  created:Date.now(),
  reactions:{neutral:0,shy:0,melt:0}
 });

 t.value="";
 a.value="";
 loadSecrets();
}

/* REACT */
window.react=async(id,type,current)=>{
 let r=JSON.parse(localStorage.getItem("r")||"{}");
 if(r[id])return alert("Ya reaccionaste");

 await updateDoc(doc(db,"secretos",id),{
  [`reactions.${type}`]:(current||0)+1
 });

 r[id]=type;
 localStorage.setItem("r",JSON.stringify(r));
 loadSecrets();
};

/* SHARE */
window.share=(text)=>{
 navigator.clipboard.writeText(text);
 alert("Copiado");
}

/* REPORT */
window.report=(id)=>{
 alert("Reportado");
}

/* COMENTAR */
window.addComment=async(secretId,parentId=null)=>{
 const input=document.getElementById(parentId?`reply-${parentId}`:`c-${secretId}`);
 if(!input.value)return;

 await addDoc(collection(db,"secretos",secretId,"comentarios"),{
  text:input.value,
  parentId,
  created:Date.now()
 });

 input.value="";
 loadSecrets();
};

window.toggleReply=(id)=>{
 const el=document.getElementById("box-"+id);
 el.style.display=el.style.display==="none"?"block":"none";
};

/* LOAD */
async function loadSecrets(){
 const cont=document.getElementById("secrets");
 cont.innerHTML="";

 const snap=await getDocs(query(collection(db,"secretos"),orderBy("created","desc")));

 for(const d of snap.docs){
  const data=d.data();
  const r=data.reactions||{};
  const reacted=JSON.parse(localStorage.getItem("r")||"{}")[d.id];

  let reactionsHTML="";

  if(reacted){
   reactionsHTML=`<div class="reacted">${reacted}</div>`;
  }else{
   reactionsHTML=`
   😶 ${r.neutral||0}
   🤭 ${r.shy||0}
   🫠 ${r.melt||0}
   <div>
   <span class="reaction-btn" onclick="react('${d.id}','neutral',${r.neutral||0})">😶</span>
   <span class="reaction-btn" onclick="react('${d.id}','shy',${r.shy||0})">🤭</span>
   <span class="reaction-btn" onclick="react('${d.id}','melt',${r.melt||0})">🫠</span>
   </div>`;
  }

  const commentsSnap=await getDocs(collection(db,"secretos",d.id,"comentarios"));
  let comments=[];
  commentsSnap.forEach(c=>comments.push({id:c.id,...c.data()}));

  let map={},roots=[];
  comments.forEach(c=>{c.replies=[];map[c.id]=c});
  comments.forEach(c=>c.parentId?map[c.parentId]?.replies.push(c):roots.push(c));

  function render(c){
   return `
   <div style="margin-left:${c.parentId?15:0}px">
   • ${c.text}
   <button onclick="toggleReply('${c.id}')">Resp</button>

   <div id="box-${c.id}" style="display:none">
   <input id="reply-${c.id}">
   <button onclick="addComment('${d.id}','${c.id}')">Enviar</button>
   </div>

   ${c.replies.map(render).join("")}
   </div>`;
  }

  const div=document.createElement("div");
  div.className="secret";

  div.innerHTML=`
  <div class="meta">${data.age}|${data.gender} • ${timeAgo(data.created)}</div>
  <div>${data.text}</div>

  ${reactionsHTML}

  <button onclick="share('${data.text}')">Compartir</button>
  <button onclick="report('${d.id}')">Reportar</button>

  <input id="c-${d.id}" placeholder="Comentar">
  <button onclick="addComment('${d.id}')">Enviar</button>

  ${roots.map(render).join("")}
  `;

  cont.appendChild(div);
 }
}

document.getElementById("sendBtn").onclick=addSecret;
loadSecrets();

window.closeFooter=()=>document.getElementById("footer").style.display="none";

</script>

<div class="footer" id="footer">
<span class="close-btn" onclick="closeFooter()">✕</span>
Plataforma libre. No compartas datos personales.
</div>

</body>
</html>
