<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pretty Secret</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #0d0d0d;
    color: white;
    font-family: Consolas, monospace;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 40px;
    font-family: 'Orbitron', sans-serif;
}

.container {
    display: flex;
    height: 90vh;
}

.left {
    width: 60%;
    padding: 20px;
    overflow-y: scroll;
    border-right: 1px solid #333;
}

.secret {
    background: #1a1a1a;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.meta {
    font-size: 12px;
    color: #aaa;
}

.right {
    width: 40%;
    padding: 20px;
}

textarea, input {
    width: 100%;
    background: #111;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 5px;
    margin-top: 10px;
}

.gender, .emoji-selector {
    display: flex;
    margin-top: 10px;
}

.gender button, .emoji-selector button {
    flex: 1;
    padding: 10px;
    background: black;
    color: white;
    border: 1px solid #333;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
}

.emoji-selector button.active {
    background: #222;
    transform: scale(1.2);
}

button.submit {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: #444;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<header>PRETTY SECRET</header>

<div class="container">

<div class="left" id="secrets"></div>

<div class="right">
    <h3>Confesá tu secreto</h3>

    <textarea id="text" placeholder="Escribí tu secreto..."></textarea>
    <input type="number" id="age" placeholder="Edad">

    <div class="gender">
        <button onclick="setGender('M')">M</button>
        <button onclick="setGender('F')">F</button>
        <button onclick="setGender('X')">X</button>
    </div>

    <div class="emoji-selector">
        <button onclick="setEmoji('😶')">😶</button>
        <button onclick="setEmoji('🤭')">🤭</button>
        <button onclick="setEmoji('🫠')">🫠</button>
    </div>

    <button class="submit" id="sendBtn">Enviar</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPhTnskIjMpiOaALmjeCVQgRtuIE6DLAU",
  authDomain: "prettysecret-32c22.firebaseapp.com",
  projectId: "prettysecret-32c22",
  storageBucket: "prettysecret-32c22.firebasestorage.app",
  messagingSenderId: "1011608096795",
  appId: "1:1011608096795:web:1e0ec73136036f877628be"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedGender = "X";
let selectedEmoji = "😶";

window.setGender = (g) => selectedGender = g;

window.setEmoji = (emoji) => {
    selectedEmoji = emoji;

    document.querySelectorAll(".emoji-selector button").forEach(btn => {
        btn.classList.remove("active");
    });

    event.target.classList.add("active");
};

/* ⏱ TIEMPO */
function timeAgo(timestamp) {
    const now = Date.now();
    const diff = Math.floor((now - timestamp) / 1000);

    if (diff < 60) return "hace unos segundos";
    if (diff < 3600) return `hace ${Math.floor(diff / 60)} min`;
    if (diff < 86400) return `hace ${Math.floor(diff / 3600)} h`;

    return `hace ${Math.floor(diff / 86400)} días`;
}

/* 🔥 GUARDAR */
async function addSecret() {
    const text = document.getElementById("text").value;
    const age = document.getElementById("age").value;

    if (!text || !age) return alert("Completá todo");

    await addDoc(collection(db, "secretos"), {
        text,
        age,
        gender: selectedGender,
        emoji: selectedEmoji,
        created: Date.now()
    });

    document.getElementById("text").value = "";
    document.getElementById("age").value = "";

    loadSecrets();
}

/* 🔥 MOSTRAR */
async function loadSecrets() {
    const container = document.getElementById("secrets");
    container.innerHTML = "";

    const q = query(collection(db, "secretos"), orderBy("created", "desc"));
    const snapshot = await getDocs(q);

    snapshot.forEach(docSnap => {
        const data = docSnap.data();

        const div = document.createElement("div");
        div.className = "secret";

        div.innerHTML = `
            <div class="meta">
                ${data.emoji || "😶"} • Edad: ${data.age} | ${data.gender} • ${timeAgo(data.created)}
            </div>

            <div style="margin-top:10px; font-size:18px;">
                ${data.text}
            </div>

            <div style="margin-top:10px;">
                <input id="c-${docSnap.id}" placeholder="¿Qué le dirías?" style="font-size:12px;">
                <button onclick="addComment('${docSnap.id}')">Enviar</button>
            </div>

            <div id="comments-${docSnap.id}" style="margin-top:10px;"></div>
        `;

        container.appendChild(div);

        loadComments(docSnap.id);
    });
}

/* 💬 COMENTARIOS */
window.addComment = async (id) => {
    const input = document.getElementById(`c-${id}`);
    const text = input.value;

    if (!text) return;

    await addDoc(collection(db, "secretos", id, "comentarios"), {
        text,
        created: Date.now()
    });

    input.value = "";
    loadComments(id);
};

async function loadComments(id) {
    const container = document.getElementById(`comments-${id}`);
    if (!container) return;

    const snap = await getDocs(collection(db, "secretos", id, "comentarios"));

    let html = "";
    snap.forEach(c => {
        html += `<div style="font-size:12px;">• ${c.data().text}</div>`;
    });

    container.innerHTML = html;
}

/* 🔗 */
document.getElementById("sendBtn").addEventListener("click", addSecret);

loadSecrets();

</script>

</body>
</html>
