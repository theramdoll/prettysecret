<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pretty Secret</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #0d0d0d;
    color: white;
    font-family: Consolas, monospace;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 40px;
    font-family: 'Orbitron', sans-serif;
}

.container {
    display: flex;
    height: 90vh;
}

.left {
    width: 60%;
    padding: 20px;
    overflow-y: scroll;
    border-right: 1px solid #333;
}

.secret {
    background: #1a1a1a;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.meta {
    font-size: 12px;
    color: #aaa;
}

.right {
    width: 40%;
    padding: 20px;
}

textarea, input {
    width: 100%;
    background: #111;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 5px;
    margin-top: 10px;
}

.gender {
    display: flex;
    margin-top: 10px;
}

.gender button {
    flex: 1;
    padding: 10px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}

button.submit {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: #444;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<header>PRETTY SECRET</header>

<div class="container">

<div class="left" id="secrets"></div>

<div class="right">
    <h3>Confesá tu secreto</h3>

    <textarea id="text" placeholder="Escribí tu secreto..."></textarea>
    <input type="number" id="age" placeholder="Edad">

    <div class="gender">
        <button onclick="setGender('M')">M</button>
        <button onclick="setGender('F')">F</button>
        <button onclick="setGender('X')">X</button>
    </div>

    <button class="submit" id="sendBtn">Enviar</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, updateDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "prettysecret-32c22.firebaseapp.com",
  projectId: "prettysecret-32c22",
  storageBucket: "prettysecret-32c22.firebasestorage.app",
  messagingSenderId: "1011608096795",
  appId: "1:1011608096795:web:1e0ec73136036f877628be"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedGender = "X";

window.setGender = (g) => selectedGender = g;

/* ⏱ TIEMPO */
function timeAgo(timestamp) {
    const now = Date.now();
    const diff = Math.floor((now - timestamp) / 1000);

    if (diff < 60) return "hace unos segundos";
    if (diff < 3600) return `hace ${Math.floor(diff / 60)} min`;
    if (diff < 86400) return `hace ${Math.floor(diff / 3600)} h`;

    return `hace ${Math.floor(diff / 86400)} días`;
}

/* 🔥 GUARDAR */
async function addSecret() {
    const text = document.getElementById("text").value;
    const age = document.getElementById("age").value;

    if (!text || !age) return alert("Completá todo");

    await addDoc(collection(db, "secretos"), {
        text,
        age,
        gender: selectedGender,
        created: Date.now(),
        reactions: {
            neutral: 0,
            shy: 0,
            melt: 0
        }
    });

    document.getElementById("text").value = "";
    document.getElementById("age").value = "";

    loadSecrets();
}

/* 😶🤭🫠 REACCIONAR */
async function react(secretId, type, current) {

    let reacted = localStorage.getItem("reactedSecrets");

    if (!reacted) {
        reacted = {};
    } else {
        reacted = JSON.parse(reacted);
    }

    if (reacted[secretId]) {
        alert("Ya reaccionaste a este secreto");
        return;
    }

    await updateDoc(doc(db, "secretos", secretId), {
        [`reactions.${type}`]: (current || 0) + 1
    });

    reacted[secretId] = true;
    localStorage.setItem("reactedSecrets", JSON.stringify(reacted));

    loadSecrets();
}

/* 🔽 MOSTRAR / OCULTAR */
function toggleReactions(id) {
    const el = document.getElementById(`r-${id}`);
    el.style.display = el.style.display === "none" ? "block" : "none";
}

/* 💬 COMENTAR */
async function addComment(secretId) {
    const input = document.getElementById(`c-${secretId}`);
    const text = input.value;

    if (!text) return;

    await addDoc(collection(db, "secretos", secretId, "comentarios"), {
        text,
        created: Date.now()
    });

    input.value = "";
    loadSecrets();
}

/* 🔥 MOSTRAR */
async function loadSecrets() {
    const container = document.getElementById("secrets");
    container.innerHTML = "";

    const q = query(collection(db, "secretos"), orderBy("created", "desc"));
    const snapshot = await getDocs(q);

    for (const d of snapshot.docs) {
        const data = d.data();

        const reactions = data.reactions || { neutral:0, shy:0, melt:0 };

        const commentsSnap = await getDocs(collection(db, "secretos", d.id, "comentarios"));

        let commentsHTML = "";
        commentsSnap.forEach(c => {
            commentsHTML += `<div style="font-size:12px;">• ${c.data().text}</div>`;
        });

        const div = document.createElement("div");
        div.className = "secret";

        div.innerHTML = `
            <div class="meta">
                Edad: ${data.age} | ${data.gender} • ${timeAgo(data.created)}
            </div>

            <div>${data.text}</div>

            <div style="margin-top:10px;">
                😶 ${reactions.neutral} 
                🤭 ${reactions.shy} 
                🫠 ${reactions.melt}

                <button onclick="toggleReactions('${d.id}')">Reaccionar</button>

                <div id="r-${d.id}" style="display:none; margin-top:5px;">
                    <button onclick="react('${d.id}', 'neutral', ${reactions.neutral})">😶</button>
                    <button onclick="react('${d.id}', 'shy', ${reactions.shy})">🤭</button>
                    <button onclick="react('${d.id}', 'melt', ${reactions.melt})">🫠</button>
                </div>
            </div>

            <div style="margin-top:10px;">
                <input id="c-${d.id}" placeholder="¿Qué le dirías?" style="font-size:12px;">
                <button onclick="addComment('${d.id}')">Enviar</button>
            </div>

            <div style="margin-top:10px;">
                ${commentsHTML}
            </div>
        `;

        container.appendChild(div);
    }
}

/* 🔗 CONEXIÓN */
document.getElementById("sendBtn").addEventListener("click", addSecret);

window.react = react;
window.toggleReactions = toggleReactions;
window.addComment = addComment;

/* 🚀 INICIO */
loadSecrets();

</script>

</body>
</html>
