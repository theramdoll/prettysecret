<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretty Secret</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { margin: 0; background: #0d0d0d; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        header { text-align: center; padding: 30px; font-size: 35px; font-family: 'Orbitron', sans-serif; letter-spacing: 4px; color: #fff; text-shadow: 0 0 10px #555; }
        
        .container { display: flex; height: calc(100vh - 100px); }
        .left { width: 65%; padding: 20px; overflow-y: auto; border-right: 1px solid #222; }
        .right { width: 35%; padding: 30px; box-sizing: border-box; }

        .secret { background: #161616; padding: 20px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #222; transition: 0.3s; }
        .secret:hover { border-color: #444; }
        .meta { font-size: 11px; color: #777; text-transform: uppercase; margin-bottom: 10px; font-family: monospace; }
        
        textarea, input { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; margin-top: 10px; box-sizing: border-box; outline: none; }
        textarea:focus, input:focus { border-color: #666; }
        textarea { height: 100px; resize: none; }

        .gender { display: flex; gap: 10px; margin-top: 15px; }
        .gender button { flex: 1; padding: 12px; background: #111; color: #666; border: 1px solid #333; border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .gender button.active { background: #fff; color: #000; border-color: #fff; }

        .submit { margin-top: 20px; width: 100%; padding: 15px; background: #fff; border: none; color: #000; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .submit:hover { background: #ccc; }

        .react-btn { background: none; border: 1px solid #333; color: #aaa; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-left: 10px; }
        .react-grid { display: flex; gap: 10px; margin-top: 10px; background: #111; padding: 10px; border-radius: 8px; }
        .react-grid button { background: none; border: none; font-size: 20px; cursor: pointer; transition: transform 0.2s; }
        .react-grid button:hover { transform: scale(1.3); }
        
        .comment-section { border-top: 1px solid #222; margin-top: 15px; padding-top: 10px; }
        .comment { font-size: 13px; color: #bbb; margin-bottom: 5px; padding-left: 5px; border-left: 2px solid #333; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<header>PRETTY SECRET</header>

<div class="container">
    <div class="left" id="secrets"></div>

    <div class="right">
        <h3>Confesá tu secreto</h3>
        <textarea id="text" placeholder="¿Qué estás pensando?"></textarea>
        <input type="number" id="age" placeholder="Tu edad">

        <div class="gender" id="genderGroup">
            <button onclick="setGender('M', this)">M</button>
            <button onclick="setGender('F', this)">F</button>
            <button onclick="setGender('X', this)" class="active">X</button>
        </div>

        <button class="submit" id="sendBtn">Publicar secreto</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, updateDoc, doc } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyBPhTnskIjMpiOaALmjeCVQgRtuIE6DLAU",
        authDomain: "://firebaseapp.com",
        projectId: "prettysecret-32c22",
        storageBucket: "prettysecret-32c22.firebasestorage.app",
        messagingSenderId: "1011608096795",
        appId: "1:1011608096795:web:1e0ec73136036f877628be"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let selectedGender = "X";

    window.setGender = (g, btn) => {
        selectedGender = g;
        document.querySelectorAll('#genderGroup button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    };

    function timeAgo(timestamp) {
        const diff = Math.floor((Date.now() - timestamp) / 1000);
        if (diff < 60) return "hace unos segundos";
        if (diff < 3600) return `hace ${Math.floor(diff / 60)} min`;
        if (diff < 86400) return `hace ${Math.floor(diff / 3600)} h`;
        const dias = Math.floor(diff / 86400);
        return `hace ${dias} ${dias === 1 ? 'día' : 'días'}`;
    }

    async function addSecret() {
        const text = document.getElementById("text").value;
        const age = document.getElementById("age").value;
        if (!text || !age) return alert("Por favor, completa los campos");

        await addDoc(collection(db, "secretos"), {
            text, age, gender: selectedGender, created: Date.now(),
            reactions: { neutral: 0, shy: 0, melt: 0 }
        });

        document.getElementById("text").value = "";
        document.getElementById("age").value = "";
        loadSecrets();
    }

    window.react = async (secretId, type, current) => {
        let reacted = JSON.parse(localStorage.getItem("reactedSecrets") || "{}");
        if (reacted[secretId]) return alert("Ya reaccionaste a esto");

        await updateDoc(doc(db, "secretos", secretId), {
            [`reactions.${type}`]: (current || 0) + 1
        });

        reacted[secretId] = true;
        localStorage.setItem("reactedSecrets", JSON.stringify(reacted));
        loadSecrets();
    };

    window.toggleReactions = (id) => {
        const el = document.getElementById(`r-${id}`);
        el.style.display = el.style.display === "none" ? "flex" : "none";
    };

    window.addComment = async (secretId) => {
        const input = document.getElementById(`c-${secretId}`);
        if (!input.value) return;
        await addDoc(collection(db, "secretos", secretId, "comentarios"), {
            text: input.value, created: Date.now()
        });
        input.value = "";
        loadSecrets();
    };

    async function loadSecrets() {
        const container = document.getElementById("secrets");
        const q = query(collection(db, "secretos"), orderBy("created", "desc"));
        const snapshot = await getDocs(q);

        container.innerHTML = "";

        for (const d of snapshot.docs) {
            const data = d.data();
            const reactions = data.reactions || { neutral: 0, shy: 0, melt: 0 };
            
            const commentsSnap = await getDocs(collection(db, "secretos", d.id, "comentarios"));
            let commentsHTML = "";
            commentsSnap.forEach(c => {
                commentsHTML += `<div class="comment">• ${c.data().text}</div>`;
            });

            const div = document.createElement("div");
            div.className = "secret";
            div.innerHTML = `
                <div class="meta">Edad: ${data.age} | ${data.gender} • ${timeAgo(data.created)}</div>
                <div style="line-height:1.5;">${data.text}</div>
                <div style="margin-top:15px; display:flex; align-items:center;">
                    <span title="Neutral">😶 ${reactions.neutral || 0}</span>&nbsp;&nbsp;
                    <span title="Tímido">🤭 ${reactions.shy || 0}</span>&nbsp;&nbsp;
                    <span title="Derritiéndose">🫠 ${reactions.melt || 0}</span>
                    <button class="react-btn" onclick="toggleReactions('${d.id}')">Reaccionar</button>
                </div>
                <div id="r-${d.id}" class="react-grid" style="display:none;">
                    <button onclick="react('${d.id}', 'neutral', ${reactions.neutral})">😶</button>
                    <button onclick="react('${d.id}', 'shy', ${reactions.shy})">🤭</button>
                    <button onclick="react('${d.id}', 'melt', ${reactions.melt})">🫠</button>
                </div>
                <div class="comment-section">
                    <div style="display:flex; gap:5px;">
                        <input id="c-${d.id}" placeholder="Escribe un comentario..." style="font-size:12px; margin-top:0;">
                        <button onclick="addComment('${d.id}')" style="background:#333; border:none; color:white; border-radius:5px; padding:0 15px; cursor:pointer;">Enviar</button>
                    </div>
                    <div style="margin-top:10px;">${commentsHTML}</div>
                </div>
            `;
            container.appendChild(div);
        }
    }

    document.getElementById("sendBtn").addEventListener("click", addSecret);
    loadSecrets();
</script>

</body>
</html>
